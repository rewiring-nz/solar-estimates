# GitHub Actions Workflow: Deploy MkDocs to GitHub Pages (Mocked Version)
# ------------------------------------------------------
# PURPOSE:
#   This workflow automates the documentation publishing using "Mocking".
#   It bypasses the installation of heavy geospatial libraries (GDAL/GRASS)
#   by pretending they are present, allowing the documentation to build 
#   faster and without system-level dependencies.
# ------------------------------------------------------

name: Publish Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Documentation Tools
        # We only install the tools needed to build the site.
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocstrings[python]

#      - name: Prepare Documentation Files
#        run: cp LICENSE.txt docs/license.md

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          PYTHONPATH: src